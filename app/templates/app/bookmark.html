<!DOCTYPE html>
<html>
<head>
    <title>Bookmark</title>
</head>
<body>

<form method="post">
    {% csrf_token %}
    <input type="text" name="filter_keyword" value="{{ keyword }}">
    <button type="submit">搜索</button>
</form>

<hr>

{% if result %}
    <h3>搜索结果：</h3>
    <ul>
        {% for item in result %}
            <li>
                <strong>{{ item.title }}</strong><br>
                <a href="{{ item.url }}">{{ item.url }}</a>
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>没有找到相关内容</p>
{% endif %}

</body>
</html>
