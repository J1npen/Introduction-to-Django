{% load static %}
<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随机图片</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      background: #0f0f0f;
      font-family: 'Hiragino Sans', 'Noto Sans SC', sans-serif;
    }

    .image-frame {
      position: relative;
      width: min(80vw, 600px);
      aspect-ratio: 1/1;
      border-radius: 4px;
      overflow: hidden;
      background: #1a1a1a;
      box-shadow: 0 0 0 1px #333, 0 24px 64px rgba(0,0,0,0.6);
    }

    .image-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transition: opacity 0.4s ease;
    }

    .image-frame img.fade-out { opacity: 0; }

    .btn {
      padding: 0.75rem 2.5rem;
      background: transparent;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 2px;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .btn:hover {
      background: #e0e0e0;
      color: #0f0f0f;
      border-color: #e0e0e0;
    }

    .no-images {
      color: #666;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

{% if images_json != "[]" %}
  <div class="image-frame">
    <img id="photo" src="" alt="随机图片">
  </div>
  <button class="btn" onclick="nextImage()">换一张</button>
{% else %}
  <p class="no-images">static/app/img 目录中暂无图片</p>
{% endif %}

<script>
  const images = {{ images_json|safe }};
  const img = document.getElementById('photo');
  let current = -1;

  function getStaticUrl(filename) {
    // 构建 static 路径
    return "{% static 'app/img/' %}".replace(/\/$/, '') + '/' + filename;
  }

  function nextImage() {
    if (images.length === 0) return;

    // 避免连续出现同一张（图片数 > 1 时）
    let next = current;
    if (images.length > 1) {
      while (next === current) {
        next = Math.floor(Math.random() * images.length);
      }
    }
    current = next;

    img.classList.add('fade-out');
    setTimeout(() => {
      img.src = getStaticUrl(images[current]);
      img.classList.remove('fade-out');
    }, 200);
  }

  // 页面加载时随机显示一张
  nextImage();
</script>
</body>
</html>
